services:
  db:
    container_name: market-postgres
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    container_name: market-redis
    image: redis:7.2
    restart: always
    ports:
      - "6379:6379"

  web:
    container_name: market-app
    image: market-app
    build:
      context: .
      dockerfile: market-app/Dockerfile
    restart: on-failure
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    environment:
      R2DBC_URL: r2dbc:postgresql://db:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      PAYMENT_BASE_URL: http://payment-service:8081

  payment-service:
    container_name: payment-service
    image: payment-service
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    restart: on-failure
    ports:
      - "8081:8081"

volumes:
  pgdata:
