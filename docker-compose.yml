services:
  db:
    container_name: market-postgres
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    container_name: market-redis
    image: redis:7.2
    restart: always
    ports:
      - "6379:6379"

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.1.3
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_MARKET_CLIENT_ID: ${KEYCLOAK_MARKET_CLIENT_ID}
      KEYCLOAK_MARKET_CLIENT_SECRET: ${KEYCLOAK_MARKET_CLIENT_SECRET}
    entrypoint: ["/bin/sh", "/opt/keycloak/init/init-market-client.sh"]
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak/init-market-client.sh:/opt/keycloak/init/init-market-client.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    container_name: market-app
    image: market-app
    build:
      context: .
      dockerfile: market-app/Dockerfile
    restart: on-failure
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      R2DBC_URL: r2dbc:postgresql://db:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      PAYMENT_BASE_URL: http://payment-service:8081
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/master
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_MARKET_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_MARKET_CLIENT_SECRET}

  payment-service:
    container_name: payment-service
    image: payment-service
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    restart: on-failure
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "8081:8081"

volumes:
  pgdata:
