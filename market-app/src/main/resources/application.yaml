spring:
  application.name: market-app
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/market}
    username: ${DB_USERNAME:market_user}
    password: ${DB_PASSWORD:market_password}
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  sql.init.mode: never  # never, always
  jpa.hibernate.ddl-auto: validate
  security.oauth2.client:
    provider.keycloak:
      issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8082/realms/master}
    registration.market:
      provider: keycloak
      authorization-grant-type: client_credentials
      client-id: ${KEYCLOAK_CLIENT_ID:market-client}
      client-secret: ${KEYCLOAK_CLIENT_SECRET}
      client-authentication-method: client_secret_post
server.error.include-message: always
payment:
  base-url: ${PAYMENT_BASE_URL:http://localhost:8081}
