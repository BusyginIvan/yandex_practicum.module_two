<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Витрина магазина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .page-shell {
            max-width: 900px;
        }
    </style>
</head>

<body class="bg-light">
<div class="container p-2 page-shell">
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <h2>
                    <span class="badge text-bg-success">Витрина магазина</span>
                </h2>
                <a href="/items" class="btn btn-secondary bi bi-arrow-left-square"> Главная</a>
                <form method="post" action="/logout" class="ms-auto" th:if="${authenticated}">
                    <button type="submit" class="btn btn-outline-secondary bi bi-box-arrow-right"> Выйти</button>
                </form>
                <a href="/login" class="btn btn-secondary ms-auto bi bi-box-arrow-in-right" th:unless="${authenticated}"> Войти</a>
            </div>
        </div>
    </div>
    <div class="row p-2">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <b>Регистрация</b>
                </div>
                <div class="card-body">
                    <form th:action="@{/register}" th:object="${form}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Логин</label>
                            <input id="username" class="form-control" type="text" th:field="*{username}" maxlength="255" required>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input id="password" class="form-control" type="password" th:field="*{password}" required>
                            <div class="text-danger mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <div class="hstack gap-2">
                            <button type="submit" class="btn btn-success bi bi-person-plus"> Зарегистрироваться</button>
                            <a th:href="@{/login}" class="btn btn-outline-secondary ms-auto" th:unless="${authenticated}">Войти</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="container p-2 page-shell" th:if="${registrationError}">
    <div class="row p-2">
        <div class="col-12">
            <div class="alert alert-danger alert-dismissible fade show mb-0" role="alert">
                <span th:text="${registrationError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>

</html>
