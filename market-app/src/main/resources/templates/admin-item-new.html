<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Витрина магазина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .page-shell {
            max-width: 900px;
        }
    </style>
</head>

<body class="bg-light">
<div class="container p-2 page-shell">
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <h2>
                    <span class="badge text-bg-success">Витрина магазина</span>
                </h2>
                <a href="/items" class="btn btn-secondary bi bi-arrow-left-square"> Главная</a>
                <form method="post" action="/logout" class="ms-auto">
                    <button type="submit" class="btn btn-outline-secondary bi bi-box-arrow-right"> Выйти</button>
                </form>
            </div>
        </div>
    </div>
    <div class="row p-2">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <b>Новый товар</b>
                </div>
                <div class="card-body">
                    <form method="post" action="/admin/items" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="title" class="form-label">Название</label>
                            <input id="title" class="form-control" type="text" name="title" maxlength="255" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <textarea id="description" class="form-control" name="description" rows="5" maxlength="4096" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="price" class="form-label">Цена</label>
                                <input id="price" class="form-control" type="number" name="price" min="1" step="1" required>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label for="image" class="form-label">Изображение</label>
                                <input id="image" class="form-control" type="file" name="image" accept="image/*">
                            </div>
                        </div>
                        <div class="hstack gap-2">
                            <button type="submit" class="btn btn-success bi bi-plus-lg"> Создать</button>
                            <a href="/items" class="btn btn-outline-secondary ms-auto">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="container p-2 page-shell" th:if="${created}">
    <div class="row p-2">
        <div class="col-12">
            <div class="alert alert-success alert-dismissible fade show mb-0" role="alert">
                Товар успешно создан.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>
    </div>
</div>
<div class="container p-2 page-shell" th:if="${errorStatus != null}">
    <div class="row p-2">
        <div class="col-12">
            <div class="alert alert-danger alert-dismissible fade show mb-0" role="alert">
                <b th:text="${'Ошибка ' + errorStatus + ':'}"></b>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>

</html>
